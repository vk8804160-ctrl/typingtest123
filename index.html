<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JR Typing System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

@font-face{
font-family:"KrutiDev";
src:url("KrutiDev010.ttf") format("truetype");
font-display:swap;
}

body{
font-family:Arial;
background:#eef1f7;
padding:15px;
margin:0;
}

h2{
text-align:center;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.left{
flex:1;
min-width:300px;
}

.right{
width:300px;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#highlight{
background:white;
padding:15px;
border-radius:6px;
font-size:20px;
min-height:120px;
border:1px solid #ccc;
line-height:32px;
}

#typingArea{
width:100%;
height:160px;
font-size:20px;
padding:10px;
margin-top:10px;
border-radius:6px;
resize:none;
border:1px solid #ccc;
}

button{
padding:10px 15px;
margin:5px;
background:#4b6cff;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

.correct{
background:#b8ffb8;
}

.wrong{
background:#ffb8b8;
}

#graph{
margin-top:20px;
}

.controls{
text-align:center;
margin-bottom:15px;
}

input,select{
padding:6px;
margin:4px;
}

@media(max-width:768px){

.container{
flex-direction:column;
}

.right{
width:100%;
}

}

</style>

</head>

<body>

<h2>VIKAS Typing Platform</h2>

<div class="controls">

<input id="username" placeholder="Enter Name">

<select id="fontSelect" onchange="loadTests()">
<option value="Arial">English</option>
<option value="KrutiDev">KrutiDev</option>
</select>

<select id="testSelect"></select>

<select id="timeSelect">
<option value="60">1 Minute</option>
<option value="120">2 Minute</option>
<option value="300">5 Minute</option>
</select>

<br>

<button onclick="startTest()">Start</button>
<button onclick="finishTest()">Finish</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="container">

<div class="left">

<div id="highlight"></div>

<textarea id="typingArea"></textarea>

</div>

<div class="right">

<h3 id="timer">Time 0</h3>
<h3 id="wpm">0 WPM</h3>
<h3 id="accuracy">Accuracy 100%</h3>

<canvas id="graph"></canvas>

</div>

</div>

<script>

/* ---------------- English Stories ---------------- */

let englishTests=[

`Typing practice is one of the most important skills in the digital world today. 
Students and professionals use typing every day while working on computers. 
A person who types faster can complete work quickly and efficiently. 
Typing tests help measure speed and accuracy. 
Daily typing practice improves productivity and confidence. 
Many government and private jobs require typing tests. 
Accuracy is very important while typing documents. 
Regular practice helps increase typing speed gradually. 
Typing is also useful for writing emails, documents, and reports. 
With consistent effort anyone can improve typing speed and accuracy.`,

`Technology is changing our lives rapidly. 
Computers and the internet are essential tools today. 
Typing is a basic skill required to use computers effectively. 
People who type quickly can finish work faster. 
Typing also improves concentration and productivity. 
Students should learn typing early in their education. 
Typing tests measure performance and improvement. 
Daily practice increases speed and accuracy. 
Consistency and patience are key to mastering typing skills. 
Anyone can become a good typist with regular practice.`

]

/* ---------------- Hindi KrutiDev Stories ---------------- */

let hindiTests=[

`dksbZ Hkh O;fDr tc fu;fer vH;kl djrk gS rks mls lQyrk vo'; feyrh gSA
vH;kl gh lQyrk dh dqath gSA ;fn ge izfrfnuk dke djrs jgs rks ge
fdlh Hkh {ks= esa lQy gks ldrs gSaA le; dk lgh mi;ksx djuk cgqr
t:jh gSA thou esa lQyrk izkIr djus ds fy, ifjJe djuk iM+rk gSA`

]

let original=""
let startTime
let timer=null
let timeLeft=0
let chart

/* ---------------- Load Tests ---------------- */

function loadTests(){

let font=document.getElementById("fontSelect").value
let select=document.getElementById("testSelect")

select.innerHTML=""

if(font=="Arial"){

englishTests.forEach((t,i)=>{
select.innerHTML+=`<option value="${i}">English Test ${i+1}</option>`
})

original=englishTests[0]

}else{

hindiTests.forEach((t,i)=>{
select.innerHTML+=`<option value="${i}">Hindi Test ${i+1}</option>`
})

original=hindiTests[0]

}

showHighlight("")

}

loadTests()

/* ---------------- Start Test ---------------- */

function startTest(){

if(timer) clearInterval(timer)

let font=document.getElementById("fontSelect").value
let test=document.getElementById("testSelect").value

document.getElementById("highlight").style.fontFamily=font
document.getElementById("typingArea").style.fontFamily=font

original=(font=="Arial")?englishTests[test]:hindiTests[test]

document.getElementById("typingArea").value=""

timeLeft=parseInt(document.getElementById("timeSelect").value)

startTime=new Date()

timer=setInterval(()=>{

if(timeLeft<=0){

finishTest()
return

}

timeLeft--

document.getElementById("timer").innerText="Time "+timeLeft

},1000)

showHighlight("")

}

/* ---------------- Typing Event ---------------- */

document.getElementById("typingArea").addEventListener("input",function(){

let typed=this.value

showHighlight(typed)

let minutes=(new Date()-startTime)/60000

let words=typed.trim().split(/\s+/).length

let speed=Math.round(words/minutes)

if(!isFinite(speed)) speed=0

document.getElementById("wpm").innerText=speed+" WPM"

updateGraph(speed)

})

/* ---------------- Highlight ---------------- */

function showHighlight(typed){

let result=""
let correct=0

for(let i=0;i<original.length;i++){

if(i<typed.length){

if(typed[i]==original[i]){

result+=`<span class="correct">${original[i]}</span>`
correct++

}else{

result+=`<span class="wrong">${original[i]}</span>`

}

}else{

result+=original[i]

}

}

document.getElementById("highlight").innerHTML=result

let acc=Math.round((correct/original.length)*100)

document.getElementById("accuracy").innerText="Accuracy "+acc+"%"

}

/* ---------------- Finish Test ---------------- */

function finishTest(){

clearInterval(timer)
timer=null

alert("Test Finished")

}

/* ---------------- Bar Graph ---------------- */

function updateGraph(speed){

let ctx=document.getElementById("graph")

if(!chart){

chart=new Chart(ctx,{
type:'bar',
data:{
labels:["Speed"],
datasets:[{
label:"WPM",
data:[speed],
backgroundColor:"#4b6cff"
}]
},
options:{
responsive:true,
scales:{
y:{beginAtZero:true}
}
}
})

}else{

chart.data.datasets[0].data=[speed]
chart.update()

}

}

/* ---------------- PDF ---------------- */

function downloadPDF(){

const {jsPDF}=window.jspdf

let pdf=new jsPDF()

pdf.text("Typing Test Report",20,20)
pdf.text("User: "+document.getElementById("username").value,20,40)
pdf.text("Speed: "+document.getElementById("wpm").innerText,20,60)
pdf.text("Accuracy: "+document.getElementById("accuracy").innerText,20,80)

pdf.save("typing-report.pdf")

}

</script>

</body>
</html>
```
