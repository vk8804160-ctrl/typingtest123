<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VIKAS TYPING TUTOR</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:10px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.left{
flex:1;
min-width:300px;
}

.right{
width:260px;
text-align:center;
}

textarea{
width:100%;
height:150px;
font-size:18px;
padding:10px;
box-sizing:border-box;
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
}

.storyBtn{
display:block;
margin:4px 0;
width:100%;
}

canvas{
background:#111;
border-radius:50%;
margin-top:10px;
}

#storyBox{
background:white;
padding:10px;
margin-bottom:10px;
min-height:60px;
}

.correct{
color:green;
}

.wrong{
color:red;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.right{
width:100%;
}

canvas{
margin:auto;
}

}

</style>

</head>

<body>

<div id="login">

<h2>Enter Your Name</h2>

<input type="text" id="username" placeholder="Enter name">

<button onclick="start()">Start Test</button>

</div>


<div id="test" style="display:none">

<h2 id="welcome"></h2>

<select id="time">
<option value="1">1 Minute</option>
<option value="2">2 Minute</option>
<option value="5">5 Minute</option>
</select>

<div class="container">

<div class="left">

<p id="storyBox"></p>

<div id="highlight"></div>

<textarea id="typingArea"></textarea>

<button onclick="finish()">Finish</button>

</div>

<div class="right">

<canvas id="speed" width="200" height="200"></canvas>

<h3 id="liveSpeed">0 WPM</h3>

<h4 id="accuracy">Accuracy: 100%</h4>

<div id="storyList"></div>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let startTime;
let timer;
let originalText="";

const stories=[

"भारत एक महान देश है जहाँ अनेक संस्कृतियाँ रहती हैं।",

"Typing practice improves speed and accuracy.",

"Hard work is the key to success.",

"Technology makes life easier.",

"Programming builds amazing software.",

"Success comes from dedication.",

"Learning never stops.",

"Practice typing everyday to improve."

];

function start(){

let name=document.getElementById("username").value;

document.getElementById("login").style.display="none";
document.getElementById("test").style.display="block";

document.getElementById("welcome").innerText="Welcome "+name;

loadStories();

}

function loadStories(){

let list=document.getElementById("storyList");

stories.forEach((s,i)=>{

let btn=document.createElement("button");

btn.innerText="Story "+(i+1);
btn.className="storyBtn";

btn.onclick=()=>{

originalText=s;

document.getElementById("storyBox").innerText=s;

document.getElementById("highlight").innerHTML=s;

startTime=new Date();

};

list.appendChild(btn);

});

}

document.getElementById("typingArea").addEventListener("input",function(){

let text=this.value;

let result="";
let correct=0;

for(let i=0;i<originalText.length;i++){

if(text[i]==null){

result+="<span>"+originalText[i]+"</span>";

}

else if(text[i]==originalText[i]){

result+="<span class='correct'>"+originalText[i]+"</span>";
correct++;

}

else{

result+="<span class='wrong'>"+originalText[i]+"</span>";

}

}

document.getElementById("highlight").innerHTML=result;

let end=new Date();

let minutes=(end-startTime)/60000;

let words=text.split(" ").length;

let speed=Math.round(words/minutes);

document.getElementById("liveSpeed").innerText=speed+" WPM";

let accuracy=Math.round((correct/originalText.length)*100);

document.getElementById("accuracy").innerText="Accuracy: "+accuracy+"%";

drawSpeed(speed);

});

function drawSpeed(speed){

let c=document.getElementById("speed");

let ctx=c.getContext("2d");

ctx.clearRect(0,0,200,200);

ctx.beginPath();
ctx.arc(100,100,80,0,Math.PI*2);
ctx.strokeStyle="#444";
ctx.lineWidth=10;
ctx.stroke();

let angle=(speed/120)*Math.PI;

ctx.beginPath();
ctx.arc(100,100,80,Math.PI,Math.PI+angle);
ctx.strokeStyle="lime";
ctx.lineWidth=10;
ctx.stroke();

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText(speed+" WPM",60,110);

}

function finish(){

let text=document.getElementById("typingArea").value;

let end=new Date();

let minutes=(end-startTime)/60000;

let words=text.split(" ").length;

let speed=Math.round(words/minutes);

generatePDF(speed);

}

function generatePDF(speed){

const { jsPDF } = window.jspdf;

let name=document.getElementById("username").value;

let date=new Date().toLocaleDateString();

let doc=new jsPDF();

doc.setFontSize(22);
doc.text("Typing Test Result",20,20);

doc.setFontSize(14);
doc.text("Name: "+name,20,40);

doc.text("Speed: "+speed+" WPM",20,60);

doc.text("Date: "+date,20,80);

doc.save(name+"-typing-result.pdf");

}

</script>

</body>
</html>
