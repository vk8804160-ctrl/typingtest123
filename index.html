<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vikash Advanced Typing Tutor</title>

<style>

@font-face{
font-family:"KrutiDev";
src:url("KrutiDev010.ttf");
}

body{
font-family:Arial;
background:#eef1f7;
margin:0;
padding:20px;
}

h2{
margin-top:0;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.left{
flex:1;
min-width:300px;
}

.right{
width:280px;
text-align:center;
}

#storyBox{
background:white;
padding:10px;
border-radius:6px;
margin-bottom:10px;
min-height:70px;
}

#highlight{
background:white;
padding:10px;
border-radius:6px;
margin-bottom:10px;
min-height:70px;
}

textarea{
width:100%;
height:150px;
font-size:18px;
padding:10px;
border-radius:6px;
}

button{
padding:10px 15px;
margin-top:8px;
cursor:pointer;
border:none;
background:#4b6cff;
color:white;
border-radius:5px;
}

.storyBtn{
display:block;
width:100%;
margin:3px 0;
background:#333;
}

.correct{
color:green;
}

.wrong{
color:red;
}

canvas{
background:#111;
border-radius:50%;
margin-top:10px;
}

select{
padding:8px;
margin:4px;
}

#leaderboard{
background:white;
margin-top:10px;
padding:10px;
border-radius:6px;
}

@media(max-width:850px){

.container{
flex-direction:column;
}

.right{
width:100%;
}

}

</style>

</head>

<body>

<div id="login">

<h2>Vikash Typing Tutor Test</h2>

<input id="username" placeholder="Enter Name">

<br><br>

<label>Font</label>

<select id="fontSelect">

<option value="KrutiDev">KrutiDev</option>
<option value="Mangal">Mangal</option>
<option value="Times New Roman">Times New Roman</option>

</select>

<br>

<label>Timer</label>

<select id="timeSelect">

<option value="1">1 Minute</option>
<option value="2">2 Minute</option>
<option value="5">5 Minute</option>
<option value="10">10 Minute</option>

</select>

<br><br>

<button onclick="startTest()">Start Test</button>

</div>

<div id="test" style="display:none">

<h2 id="welcome"></h2>

<div class="container">

<div class="left">

<div id="storyBox"></div>

<div id="highlight"></div>

<textarea id="typingArea"></textarea>

<button onclick="finishTest()">Finish Test</button>

</div>

<div class="right">

<canvas id="speedometer" width="200" height="200"></canvas>

<h3 id="wpm">0 WPM</h3>

<h4 id="accuracy">Accuracy 100%</h4>

<h4 id="timer"></h4>

<div id="storyList"></div>

<div id="leaderboard">

<h3>Leaderboard</h3>

<div id="scores"></div>

</div>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let startTime
let originalText=""
let timerInterval
let timeLeft

const stories=[

"भारत एक ऐसा देश है जिसकी पहचान उसकी विविधता, संस्कृति, इतिहास और महान परंपराओं से होती है। यह देश केवल भौगोलिक रूप से ही बड़ा नहीं है, बल्कि अपनी सभ्यता और संस्कृति के कारण भी दुनिया में विशेष स्थान रखता है। मतदान का अधिकार है और लोग अपने प्रतिनिधियों को चुनते हैं। देश में विभिन्न राजनीतिक दल होते हुए भी लोकतांत्रिक व्यवस्था सुचारू रूप से चलती है। न्यायपालिका, विधायिका और कार्यपालिका मिलकर देश की व्यवस्था को संतुलित बनाए रखते हैं अंत में यह कहा जा सकता है कि भारत केवल एक देश नहीं, बल्कि एक विचार है। यह विचार है एकता, शांति, सहिष्णुता और प्रगति का। यहाँ की संस्कृति, इतिहास, परंपराएँ और आधुनिक उपलब्धियाँ मिलकर भारत को एक महान राष्ट्र बनाती हैं। हर भारतीय का कर्तव्य है कि वह अपने देश से प्रेम करे, उसकी संस्कृति का सम्मान करे और उसके विकास में योगदान दे। जब सभी लोग मिलकर ईमानदारी और मेहनत से काम करेंगे, तब भारत और भी अधिक शक्तिशाली और समृद्ध बनेगा इस प्रकार भारत सचमुच एक महान देश है, जो अपनी विविधता, संस्कृति, इतिहास और प्रगति के कारण पूरी दुनिया में सम्मान और गौरव का स्थान रखता है।",

"Typing practice improves speed and accuracy.",

"Hard work is the key to success.",

"Technology makes life easier.",

"Programming builds amazing software.",

"Success comes from dedication.",

"Learning never stops.",

"Practice typing everyday to improve."

]

function startTest(){

let name=document.getElementById("username").value

if(name==""){

alert("Enter Name")

return

}

document.getElementById("login").style.display="none"

document.getElementById("test").style.display="block"

document.getElementById("welcome").innerText="Welcome "+name

let font=document.getElementById("fontSelect").value

document.getElementById("typingArea").style.fontFamily=font
document.getElementById("storyBox").style.fontFamily=font
document.getElementById("highlight").style.fontFamily=font

timeLeft=document.getElementById("timeSelect").value*60

startTimer()

loadStories()

loadLeaderboard()

}

function startTimer(){

document.getElementById("timer").innerText="Time Left "+timeLeft

timerInterval=setInterval(function(){

timeLeft--

document.getElementById("timer").innerText="Time Left "+timeLeft

if(timeLeft<=0){

clearInterval(timerInterval)

finishTest()

}

},1000)

}

function loadStories(){

let list=document.getElementById("storyList")

stories.forEach((text,index)=>{

let btn=document.createElement("button")

btn.innerText="Story "+(index+1)

btn.className="storyBtn"

btn.onclick=function(){

originalText=text

document.getElementById("storyBox").innerText=text

document.getElementById("highlight").innerHTML=text

document.getElementById("typingArea").value=""

startTime=new Date()

}

list.appendChild(btn)

})

}

document.getElementById("typingArea").addEventListener("input",function(){

let typed=this.value

let result=""

let correct=0

for(let i=0;i<originalText.length;i++){

if(typed[i]==null){

result+=originalText[i]

}

else if(typed[i]==originalText[i]){

result+="<span class='correct'>"+originalText[i]+"</span>"

correct++

}

else{

result+="<span class='wrong'>"+originalText[i]+"</span>"

}

}

document.getElementById("highlight").innerHTML=result

let minutes=(new Date()-startTime)/60000

let words=typed.trim().split(/\s+/).length

let speed=Math.round(words/minutes)

if(!isFinite(speed)) speed=0

document.getElementById("wpm").innerText=speed+" WPM"

let acc=Math.round((correct/originalText.length)*100)

document.getElementById("accuracy").innerText="Accuracy "+acc+"%"

drawSpeed(speed)

})

function drawSpeed(speed){

let canvas=document.getElementById("speedometer")

let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,200,200)

ctx.beginPath()

ctx.arc(100,100,80,0,Math.PI*2)

ctx.strokeStyle="#555"

ctx.lineWidth=10

ctx.stroke()

let angle=(speed/120)*Math.PI

ctx.beginPath()

ctx.arc(100,100,80,Math.PI,Math.PI+angle)

ctx.strokeStyle="lime"

ctx.lineWidth=10

ctx.stroke()

ctx.fillStyle="white"

ctx.font="20px Arial"

ctx.fillText(speed+" WPM",60,110)

}

function finishTest(){

clearInterval(timerInterval)

let name=document.getElementById("username").value

let speed=parseInt(document.getElementById("wpm").innerText)

saveScore(name,speed)

downloadPDF(name,speed)

loadLeaderboard()

}

function saveScore(name,speed){

let scores=JSON.parse(localStorage.getItem("scores")||"[]")

scores.push({name:name,speed:speed})

scores.sort((a,b)=>b.speed-a.speed)

scores=scores.slice(0,5)

localStorage.setItem("scores",JSON.stringify(scores))

}

function loadLeaderboard(){

let scores=JSON.parse(localStorage.getItem("scores")||"[]")

let html=""

scores.forEach(s=>{

html+=s.name+" - "+s.speed+" WPM<br>"

})

document.getElementById("scores").innerHTML=html

}

function downloadPDF(name,speed){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

doc.text("Typing Test Result",20,20)

doc.text("Name: "+name,20,40)

doc.text("Speed: "+speed+" WPM",20,60)

doc.text("Date: "+new Date().toLocaleDateString(),20,80)

doc.save(name+"_typing_result.pdf")

}

</script>

</body>

</html>
