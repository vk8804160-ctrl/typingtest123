<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Typing Test</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#141e30,#243b55);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
background:#1f2937;
padding:40px;
border-radius:12px;
width:700px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:20px;
}

.text-box{
background:#111827;
padding:20px;
border-radius:8px;
font-size:18px;
line-height:1.6;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:8px;
padding:15px;
font-size:16px;
outline:none;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:18px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<div class="container">

<h1>⌨️ Professional Typing Test</h1>

<div class="text-box" id="textDisplay">
Typing speed is an important skill for students programmers and professionals. 
Regular practice improves typing accuracy speed and productivity. vikas kumar 
</div>

<textarea id="inputText" placeholder="Start typing here..."></textarea>

<div class="stats">
<div>⏱ Time: <span id="time">60</span>s</div>
<div>⚡ WPM: <span id="wpm">0</span></div>
<div>🎯 Accuracy: <span id="accuracy">0</span>%</div>
</div>

<button onclick="restartTest()">Restart Test</button>

</div>

<script>

let timer = 60;
let interval;
let started = false;

const textDisplay = document.getElementById("textDisplay").innerText;
const inputText = document.getElementById("inputText");

inputText.addEventListener("input",startTyping);

function startTyping(){

if(!started){
started=true;
interval=setInterval(updateTimer,1000);
}

calculateStats();

}

function updateTimer(){

timer--;
document.getElementById("time").innerText = timer;

if(timer==0){
clearInterval(interval);
inputText.disabled=true;
}

}

function calculateStats(){

let typed = inputText.value;
let words = typed.trim().split(" ").length;

let wpm = Math.round(words/(60-timer)*60);

if(!isFinite(wpm)) wpm=0;

document.getElementById("wpm").innerText = wpm;

let correct = 0;

for(let i=0;i<typed.length;i++){

if(typed[i] === textDisplay[i]){
correct++;
}

}

let accuracy = Math.round((correct/typed.length)*100);

if(!isFinite(accuracy)) accuracy=0;

document.getElementById("accuracy").innerText = accuracy;

}

function restartTest(){

location.reload();

}

</script>

</body>
</html>
