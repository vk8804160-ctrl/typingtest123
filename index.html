<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JR Typing Tutor</title>

<style>

body{
font-family:Arial;
background:#eef1f7;
margin:0;
padding:15px;
}

h2{
margin-top:0;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.left{
flex:1;
min-width:300px;
}

.right{
width:260px;
text-align:center;
}

#storyBox{
background:white;
padding:10px;
min-height:70px;
margin-bottom:10px;
border-radius:6px;
}

#highlight{
background:white;
padding:10px;
min-height:70px;
border-radius:6px;
margin-bottom:10px;
}

textarea{
width:100%;
height:150px;
font-size:18px;
padding:10px;
box-sizing:border-box;
border-radius:6px;
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
border:none;
background:#4b6cff;
color:white;
border-radius:5px;
}

.storyBtn{
display:block;
width:100%;
margin:4px 0;
background:#333;
}

.correct{
color:green;
}

.wrong{
color:red;
}

canvas{
background:#111;
border-radius:50%;
margin-top:10px;
}

@media(max-width:850px){

.container{
flex-direction:column;
}

.right{
width:100%;
}

canvas{
margin:auto;
}

}

</style>

</head>

<body>

<div id="login">

<h2>Enter Your Name</h2>

<input type="text" id="username" placeholder="Enter name">

<br><br>

<button onclick="startTest()">Start Test</button>

</div>


<div id="test" style="display:none">

<h2 id="welcome"></h2>

<div class="container">

<div class="left">

<div id="storyBox"></div>

<div id="highlight"></div>

<textarea id="typingArea"></textarea>

<button onclick="finishTest()">Finish Test</button>

</div>


<div class="right">

<canvas id="speedometer" width="200" height="200"></canvas>

<h3 id="wpm">0 WPM</h3>

<h4 id="accuracy">Accuracy 100%</h4>

<div id="storyList"></div>

</div>

</div>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let startTime
let originalText=""

const stories=[

"भारत एक महान देश है जहाँ अनेक संस्कृतियाँ रहती हैं।",

"Typing practice improves speed and accuracy.",

"Hard work is the key to success.",

"Technology makes life easier.",

"Programming builds amazing software.",

"Success comes from dedication.",

"Learning never stops.",

"Practice typing everyday to improve.",

"India is growing rapidly in technology.",

"Education changes the future."

]


function startTest(){

let name=document.getElementById("username").value

if(name==""){

alert("Enter Name")

return

}

document.getElementById("login").style.display="none"

document.getElementById("test").style.display="block"

document.getElementById("welcome").innerText="Welcome "+name

loadStories()

}


function loadStories(){

let list=document.getElementById("storyList")

stories.forEach((text,index)=>{

let btn=document.createElement("button")

btn.innerText="Story "+(index+1)

btn.className="storyBtn"

btn.onclick=function(){

originalText=text

document.getElementById("storyBox").innerText=text

document.getElementById("highlight").innerHTML=text

document.getElementById("typingArea").value=""

startTime=new Date()

}

list.appendChild(btn)

})

}


document.getElementById("typingArea").addEventListener("input",function(){

let typed=this.value

let result=""

let correct=0

for(let i=0;i<originalText.length;i++){

if(typed[i]==null){

result+=originalText[i]

}

else if(typed[i]==originalText[i]){

result+="<span class='correct'>"+originalText[i]+"</span>"

correct++

}

else{

result+="<span class='wrong'>"+originalText[i]+"</span>"

}

}

document.getElementById("highlight").innerHTML=result

let endTime=new Date()

let minutes=(endTime-startTime)/60000

let words=typed.split(" ").length

let speed=Math.round(words/minutes)

if(speed<0) speed=0

document.getElementById("wpm").innerText=speed+" WPM"

let acc=Math.round((correct/originalText.length)*100)

document.getElementById("accuracy").innerText="Accuracy "+acc+"%"

drawSpeed(speed)

})


function drawSpeed(speed){

let canvas=document.getElementById("speedometer")

let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,200,200)

ctx.beginPath()

ctx.arc(100,100,80,0,Math.PI*2)

ctx.strokeStyle="#555"

ctx.lineWidth=10

ctx.stroke()

let angle=(speed/120)*Math.PI

ctx.beginPath()

ctx.arc(100,100,80,Math.PI,Math.PI+angle)

ctx.strokeStyle="lime"

ctx.lineWidth=10

ctx.stroke()

ctx.fillStyle="white"

ctx.font="20px Arial"

ctx.fillText(speed+" WPM",60,110)

}


function finishTest(){

let name=document.getElementById("username").value

let speed=document.getElementById("wpm").innerText

const { jsPDF } = window.jspdf

let doc=new jsPDF()

doc.setFontSize(22)

doc.text("Typing Test Result",20,20)

doc.setFontSize(14)

doc.text("Name: "+name,20,50)

doc.text("Speed: "+speed,20,70)

doc.text("Date: "+new Date().toLocaleDateString(),20,90)

doc.save(name+"_typing_result.pdf")

}

</script>

</body>

</html>
