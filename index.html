<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vikash Advanced Typing Tutor</title>

<style>

@font-face{
font-family:"KrutiDev";
src:url("KrutiDev010.ttf");
}

body{
font-family:Arial;
background:#eef1f7;
margin:0;
padding:20px;
}

h2{
margin-top:0;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.left{
flex:1;
min-width:300px;
}

.right{
width:280px;
text-align:center;
}

#storyBox{
background:white;
padding:10px;
border-radius:6px;
margin-bottom:10px;
min-height:70px;
}

#highlight{
background:white;
padding:10px;
border-radius:6px;
margin-bottom:10px;
min-height:70px;
}

textarea{
width:100%;
height:150px;
font-size:18px;
padding:10px;
border-radius:6px;
}

button{
padding:10px 15px;
margin-top:8px;
cursor:pointer;
border:none;
background:#4b6cff;
color:white;
border-radius:5px;
}

.storyBtn{
display:block;
width:100%;
margin:3px 0;
background:#333;
}

.correct{
color:green;
}

.wrong{
color:red;
}

canvas{
background:#111;
border-radius:50%;
margin-top:10px;
}

select{
padding:8px;
margin:4px;
}

#leaderboard{
background:white;
margin-top:10px;
padding:10px;
border-radius:6px;
}

@media(max-width:850px){

.container{
flex-direction:column;
}

.right{
width:100%;
}

}

</style>

</head>

<body>

<div id="login">

<h2>Vikash Typing Tutor Test</h2>

<input id="username" placeholder="Enter Name">

<br><br>

<label>Font</label>

<select id="fontSelect">

<option value="KrutiDev">KrutiDev</option>
<option value="Mangal">Mangal</option>
<option value="Times New Roman">Times New Roman</option>

</select>

<br>

<label>Timer</label>

<select id="timeSelect">

<option value="1">1 Minute</option>
<option value="2">2 Minute</option>
<option value="5">5 Minute</option>
<option value="10">10 Minute</option>

</select>

<br><br>

<button onclick="startTest()">Start Test</button>

</div>

<div id="test" style="display:none">

<h2 id="welcome"></h2>

<div class="container">

<div class="left">

<div id="storyBox"></div>

<div id="highlight"></div>

<textarea id="typingArea"></textarea>

<button onclick="finishTest()">Finish Test</button>

</div>

<div class="right">

<canvas id="speedometer" width="200" height="200"></canvas>

<h3 id="wpm">0 WPM</h3>

<h4 id="accuracy">Accuracy 100%</h4>

<h4 id="timer"></h4>

<div id="storyList"></div>

<div id="leaderboard">

<h3>Leaderboard</h3>

<div id="scores"></div>

</div>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let startTime
let originalText=""
let timerInterval
let timeLeft

const stories=[

"भारत एक ऐसा देश है जिसकी पहचान उसकी विविधता, संस्कृति, इतिहास और महान परंपराओं से होती है। यह देश केवल भौगोलिक रूप से ही बड़ा नहीं है, बल्कि अपनी सभ्यता और संस्कृति के कारण भी दुनिया में विशेष स्थान रखता है। भारत को “विविधता में एकता” का देश कहा जाता है, क्योंकि यहाँ अलग-अलग भाषाएँ, धर्म, संस्कृतियाँ और परंपराएँ होने के बावजूद लोग मिलजुलकर रहते हैं। यही विशेषता भारत को एक महान देश बनाती है। भारत का इतिहास बहुत प्राचीन और गौरवशाली है। हजारों वर्ष पहले यहाँ सिंधु घाटी सभ्यता का विकास हुआ था, जो दुनिया की सबसे पुरानी सभ्यताओं में से एक मानी जाती है। इस सभ्यता के लोग व्यवस्थित शहरों में रहते थे, साफ-सफाई का ध्यान रखते थे और व्यापार भी करते थे। इसके बाद वैदिक काल आया, जिसमें वेदों और उपनिषदों की रचना हुई। इन ग्रंथों में जीवन के उच्च आदर्शों और नैतिक मूल्यों का वर्णन किया गया है। भारत ने दुनिया को योग, आयुर्वेद और आध्यात्मिक ज्ञान दिया, जो आज भी पूरे विश्व में सम्मानित है भारत की संस्कृति बहुत समृद्ध और रंगीन है। यहाँ हर राज्य की अपनी अलग परंपरा, पहनावा, भाषा और भोजन है। उदाहरण के लिए, पंजाब में भांगड़ा और गिद्धा जैसे लोक नृत्य प्रसिद्ध हैं, जबकि राजस्थान में घूमर और कालबेलिया नृत्य लोकप्रिय हैं। दक्षिण भारत में भरतनाट्यम और कथकली जैसे शास्त्रीय नृत्य देखने को मिलते हैं। इसी तरह भारत में अनेक त्योहार मनाए जाते हैं, जैसे दीपावली, होली, ईद, क्रिसमस, बैसाखी और पोंगल। इन त्योहारों के माध्यम से लोग खुशी और प्रेम का संदेश फैलाते हैं भारत प्राकृतिक सुंदरता से भी भरपूर है। उत्तर में हिमालय की ऊँची पर्वत श्रृंखलाएँ हैं, जो देश की रक्षा करती हैं और अनेक नदियों का स्रोत हैं। गंगा, यमुना, ब्रह्मपुत्र और गोदावरी जैसी नदियाँ भारत की जीवनरेखा मानी जाती हैं। इन नदियों के किनारे बसे शहर और गाँव भारत की संस्कृति और अर्थव्यवस्था का महत्वपूर्ण हिस्सा हैं। भारत में घने जंगल, रेगिस्तान, समुद्र तट और सुंदर पहाड़ियाँ भी हैं, जो इसे प्राकृतिक रूप से बहुत समृद्ध बनाते हैं भारत की स्वतंत्रता का इतिहास भी प्रेरणादायक है। अंग्रेजों के शासन से आज़ादी पाने के लिए भारत के लोगों ने लंबा संघर्ष किया। महात्मा गांधी, भगत सिंह, सुभाष चंद्र बोस, जवाहरलाल नेहरू और अनेक स्वतंत्रता सेनानियों ने देश की आज़ादी के लिए अपने जीवन का बलिदान दिया। 15 अगस्त 1947 को भारत स्वतंत्र हुआ और तब से यह एक लोकतांत्रिक गणराज्य के रूप में आगे बढ़ रहा है। भारत का संविधान दुनिया के सबसे बड़े लोकतांत्रिक संविधान में से एक है, जो सभी नागरिकों को समान अधिकार देता है आज का भारत तेजी से विकास कर रहा है। विज्ञान, तकनीक, शिक्षा और अंतरिक्ष के क्षेत्र में भारत ने महत्वपूर्ण उपलब्धियाँ हासिल की हैं। भारतीय वैज्ञानिकों ने अंतरिक्ष में कई सफल मिशन भेजे हैं। भारतीय अंतरिक्ष अनुसंधान संगठन (ISRO) ने चंद्रयान और मंगलयान जैसे मिशनों के माध्यम से दुनिया में भारत का नाम ऊँचा किया है। इसके अलावा भारत सूचना प्रौद्योगिकी, चिकित्सा और शिक्षा के क्षेत्र में भी तेजी से आगे बढ़ रहा है भारत की सबसे बड़ी ताकत उसके लोग हैं। यहाँ के लोग मेहनती, प्रतिभाशाली और संस्कारी होते हैं। भारतीय परिवार व्यवस्था भी बहुत मजबूत मानी जाती है, जिसमें एक-दूसरे के प्रति सम्मान और प्रेम होता है। यहाँ बुजुर्गों का आदर किया जाता है और बच्चों को अच्छे संस्कार दिए जाते हैं। यही कारण है कि भारतीय समाज में एकता और सहयोग की भावना बनी रहती है भारत का लोकतंत्र भी इसकी महानता का प्रमाण है। यहाँ हर नागरिक को मतदान का अधिकार है और लोग अपने प्रतिनिधियों को चुनते हैं। देश में विभिन्न राजनीतिक दल होते हुए भी लोकतांत्रिक व्यवस्था सुचारू रूप से चलती है। न्यायपालिका, विधायिका और कार्यपालिका मिलकर देश की व्यवस्था को संतुलित बनाए रखते हैं अंत में यह कहा जा सकता है कि भारत केवल एक देश नहीं, बल्कि एक विचार है। यह विचार है एकता, शांति, सहिष्णुता और प्रगति का। यहाँ की संस्कृति, इतिहास, परंपराएँ और आधुनिक उपलब्धियाँ मिलकर भारत को एक महान राष्ट्र बनाती हैं। हर भारतीय का कर्तव्य है कि वह अपने देश से प्रेम करे, उसकी संस्कृति का सम्मान करे और उसके विकास में योगदान दे। जब सभी लोग मिलकर ईमानदारी और मेहनत से काम करेंगे, तब भारत और भी अधिक शक्तिशाली और समृद्ध बनेगा इस प्रकार भारत सचमुच एक महान देश है, जो अपनी विविधता, संस्कृति, इतिहास और प्रगति के कारण पूरी दुनिया में सम्मान और गौरव का स्थान रखता है।",

"Typing practice improves speed and accuracy.",

"Hard work is the key to success.",

"Technology makes life easier.",

"Programming builds amazing software.",

"Success comes from dedication.",

"Learning never stops.",

"Practice typing everyday to improve."

]

function startTest(){

let name=document.getElementById("username").value

if(name==""){

alert("Enter Name")

return

}

document.getElementById("login").style.display="none"

document.getElementById("test").style.display="block"

document.getElementById("welcome").innerText="Welcome "+name

let font=document.getElementById("fontSelect").value

document.getElementById("typingArea").style.fontFamily=font
document.getElementById("storyBox").style.fontFamily=font
document.getElementById("highlight").style.fontFamily=font

timeLeft=document.getElementById("timeSelect").value*60

startTimer()

loadStories()

loadLeaderboard()

}

function startTimer(){

document.getElementById("timer").innerText="Time Left "+timeLeft

timerInterval=setInterval(function(){

timeLeft--

document.getElementById("timer").innerText="Time Left "+timeLeft

if(timeLeft<=0){

clearInterval(timerInterval)

finishTest()

}

},1000)

}

function loadStories(){

let list=document.getElementById("storyList")

stories.forEach((text,index)=>{

let btn=document.createElement("button")

btn.innerText="Story "+(index+1)

btn.className="storyBtn"

btn.onclick=function(){

originalText=text

document.getElementById("storyBox").innerText=text

document.getElementById("highlight").innerHTML=text

document.getElementById("typingArea").value=""

startTime=new Date()

}

list.appendChild(btn)

})

}

document.getElementById("typingArea").addEventListener("input",function(){

let typed=this.value

let result=""

let correct=0

for(let i=0;i<originalText.length;i++){

if(typed[i]==null){

result+=originalText[i]

}

else if(typed[i]==originalText[i]){

result+="<span class='correct'>"+originalText[i]+"</span>"

correct++

}

else{

result+="<span class='wrong'>"+originalText[i]+"</span>"

}

}

document.getElementById("highlight").innerHTML=result

let minutes=(new Date()-startTime)/60000

let words=typed.trim().split(/\s+/).length

let speed=Math.round(words/minutes)

if(!isFinite(speed)) speed=0

document.getElementById("wpm").innerText=speed+" WPM"

let acc=Math.round((correct/originalText.length)*100)

document.getElementById("accuracy").innerText="Accuracy "+acc+"%"

drawSpeed(speed)

})

function drawSpeed(speed){

let canvas=document.getElementById("speedometer")

let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,200,200)

ctx.beginPath()

ctx.arc(100,100,80,0,Math.PI*2)

ctx.strokeStyle="#555"

ctx.lineWidth=10

ctx.stroke()

let angle=(speed/120)*Math.PI

ctx.beginPath()

ctx.arc(100,100,80,Math.PI,Math.PI+angle)

ctx.strokeStyle="lime"

ctx.lineWidth=10

ctx.stroke()

ctx.fillStyle="white"

ctx.font="20px Arial"

ctx.fillText(speed+" WPM",60,110)

}

function finishTest(){

clearInterval(timerInterval)

let name=document.getElementById("username").value

let speed=parseInt(document.getElementById("wpm").innerText)

saveScore(name,speed)

downloadPDF(name,speed)

loadLeaderboard()

}

function saveScore(name,speed){

let scores=JSON.parse(localStorage.getItem("scores")||"[]")

scores.push({name:name,speed:speed})

scores.sort((a,b)=>b.speed-a.speed)

scores=scores.slice(0,5)

localStorage.setItem("scores",JSON.stringify(scores))

}

function loadLeaderboard(){

let scores=JSON.parse(localStorage.getItem("scores")||"[]")

let html=""

scores.forEach(s=>{

html+=s.name+" - "+s.speed+" WPM<br>"

})

document.getElementById("scores").innerHTML=html

}

function downloadPDF(name,speed){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

doc.text("Typing Test Result",20,20)

doc.text("Name: "+name,20,40)

doc.text("Speed: "+speed+" WPM",20,60)

doc.text("Date: "+new Date().toLocaleDateString(),20,80)

doc.save(name+"_typing_result.pdf")

}

</script>

</body>

</html>
