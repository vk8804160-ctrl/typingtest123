<!DOCTYPE html>
<html>
<head>

<title> VIKAS TYPING TUTOR</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
padding:20px;
}

.container{
display:flex;
gap:20px;
}

.left{
width:70%;
}

.right{
width:30%;
}

textarea{
width:100%;
height:160px;
font-size:18px;
padding:10px;
}

button{
padding:10px 20px;
margin-top:10px;
}

.storyBtn{
display:block;
margin:5px 0;
width:100%;
}

canvas{
background:#111;
border-radius:50%;
}

</style>

</head>

<body>

<div id="login">

<h2>Enter Your Name</h2>

<input type="text" id="username" placeholder="Enter name">

<button onclick="start()">Start Test</button>

</div>


<div id="test" style="display:none">

<h2 id="welcome"></h2>

<select id="font">
<option value="Kruti Dev 010">KrutiDev</option>
<option value="Remington">Remington</option>
<option value="Mangal">Mangal</option>
<option value="Times New Roman">Times New Roman</option>
<option value="Arial">Unicode</option>
</select>

<select id="time">
<option value="1">1 Minute</option>
<option value="2">2 Minute</option>
<option value="5">5 Minute</option>
<option value="10">10 Minute</option>
<option value="20">20 Minute</option>
</select>

<div class="container">

<div class="left">

<p id="storyBox"></p>

<textarea id="typingArea"></textarea>

<button onclick="finish()">Finish</button>

</div>

<div class="right">

<canvas id="speed" width="200" height="200"></canvas>

<div id="storyList"></div>

</div>

</div>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let startTime;

const stories=[

"भारत एक महान देश है जहाँ अनेक संस्कृतियाँ रहती हैं।",

"Typing practice improves speed and accuracy.",

"Hard work is the key to success.",

"Technology makes life easier.",

"Programming builds amazing software.",

"Success comes from dedication.",

"Learning never stops.",

"Practice typing everyday to improve.",

"India is growing rapidly in technology.",

"Education changes the future.",

"Keyboard typing helps office work.",

"Data entry jobs need fast typing.",

"Computers are essential today.",

"Typing websites help students.",

"JavaScript makes websites interactive.",

"HTML builds webpage structure.",

"CSS designs the layout.",

"Speed and accuracy both matter.",

"Focus improves performance.",

"Consistency leads to mastery."

];


function start(){

let name=document.getElementById("username").value;

document.getElementById("login").style.display="none";

document.getElementById("test").style.display="block";

document.getElementById("welcome").innerText="Welcome "+name;

startTime=new Date();

loadStories();

}


function loadStories(){

let list=document.getElementById("storyList");

stories.forEach((s,i)=>{

let btn=document.createElement("button");

btn.innerText="Story "+(i+1);

btn.className="storyBtn";

btn.onclick=()=>{

document.getElementById("storyBox").innerText=s;

};

list.appendChild(btn);

});

}


function finish(){

let text=document.getElementById("typingArea").value;

let end=new Date();

let minutes=(end-startTime)/60000;

let words=text.split(" ").length;

let speed=Math.round(words/minutes);

drawSpeed(speed);

generatePDF(speed);

}


function drawSpeed(speed){

let c=document.getElementById("speed");

let ctx=c.getContext("2d");

ctx.clearRect(0,0,200,200);

ctx.fillStyle="white";

ctx.font="30px Arial";

ctx.fillText(speed+" WPM",40,110);

}


function generatePDF(speed){

const { jsPDF } = window.jspdf;

let doc=new jsPDF();

doc.setFontSize(22);

doc.text("Typing Test Result",20,20);

doc.setFontSize(14);

doc.text("Speed: "+speed+" WPM",20,40);

doc.save("typing-result.pdf");

}

</script>

</body>
</html>
